# ──────────────────────────────────────────────────────────────────
# Nginx config for Docker Compose environment
# Uses Docker service names instead of localhost
# ──────────────────────────────────────────────────────────────────

upstream backend_cluster {
    least_conn;
    server backend:5000;
    keepalive 64;
}

limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=5r/m;

gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 4;
gzip_min_length 256;
gzip_types application/json application/javascript text/plain text/css;

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    # ── Security headers ──────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Health (no rate limit) ────────────────────────────────
    location /health {
        proxy_pass http://backend_cluster;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # ── Auth (strict rate limit) ──────────────────────────────
    location /api/v1/auth {
        limit_req zone=api_auth burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://backend_cluster;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
    }

    # ── All API routes ────────────────────────────────────────
    location /api/ {
        limit_req zone=api_general burst=20 nodelay;

        proxy_pass http://backend_cluster;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;

        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
    }

    location / {
        return 404;
    }
}
