# ──────────────────────────────────────────────────────────────────
# Nginx Reverse Proxy + Load Balancer for Incubation Platform
# ──────────────────────────────────────────────────────────────────
# Install: sudo apt install nginx
# Deploy:  sudo cp nginx.conf /etc/nginx/sites-available/incubation
#          sudo ln -s /etc/nginx/sites-available/incubation /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
# ──────────────────────────────────────────────────────────────────

# ─── UPSTREAM: Backend cluster (PM2 workers share port 5000) ────
upstream backend_cluster {
    least_conn;                         # Route to least-loaded worker
    server 127.0.0.1:5000;              # PM2 cluster shares this port

    keepalive 64;                       # Persistent connections to backend
    keepalive_timeout 65s;
}

# ─── RATE LIMITING ZONES ───────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_payments:10m rate=10r/m;

# ─── PROXY CACHE (short-TTL for GET responses) ─────────────────
proxy_cache_path /var/cache/nginx/api
    levels=1:2
    keys_zone=api_cache:10m
    max_size=100m
    inactive=5m
    use_temp_path=off;

# ─── HTTP → HTTPS redirect ────────────────────────────────────
server {
    listen 80;
    server_name api.yourdomain.com;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── MAIN HTTPS SERVER ────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.yourdomain.com;

    # ── SSL CERTIFICATES (Let's Encrypt) ──────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;

    # ── SSL HARDENING ─────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── SECURITY HEADERS ──────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── GZIP COMPRESSION ──────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        text/plain
        text/css
        text/xml;

    # ── REQUEST LIMITS ────────────────────────────────────────
    client_max_body_size 10m;
    client_body_buffer_size 128k;

    # ── HEALTH CHECK (no rate limiting, no caching) ───────────
    location /health {
        proxy_pass http://backend_cluster;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # ── METRICS (internal only) ───────────────────────────────
    location /metrics {
        # Restrict to internal networks
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;

        proxy_pass http://backend_cluster;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── AUTH ENDPOINTS (strict rate limiting) ─────────────────
    location /api/v1/auth {
        limit_req zone=api_auth burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://backend_cluster;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;

        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── PAYMENT WEBHOOKS (no rate limiting, raw body) ─────────
    location ~ ^/api/v1/payments/(webhook|razorpay/webhook) {
        limit_req zone=api_payments burst=5 nodelay;

        proxy_pass http://backend_cluster;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass raw body for signature verification
        proxy_request_buffering off;
    }

    # ── CACHEABLE GET ENDPOINTS ───────────────────────────────
    location ~ ^/api/v1/courses {
        limit_req zone=api_general burst=20 nodelay;

        # Cache GET responses for 30s at Nginx level
        proxy_cache api_cache;
        proxy_cache_methods GET;
        proxy_cache_valid 200 30s;
        proxy_cache_valid 404 10s;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
        add_header X-Nginx-Cache $upstream_cache_status;

        # Only cache if backend says it's OK
        proxy_cache_bypass $http_authorization;
        proxy_no_cache $http_authorization;

        proxy_pass http://backend_cluster;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;

        proxy_read_timeout 30s;
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
    }

    # ── ALL OTHER API ENDPOINTS ───────────────────────────────
    location /api/ {
        limit_req zone=api_general burst=20 nodelay;

        proxy_pass http://backend_cluster;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;

        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
    }

    # ── BLOCK EVERYTHING ELSE ─────────────────────────────────
    location / {
        return 404;
    }
}
