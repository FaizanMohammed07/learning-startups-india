# ──────────────────────────────────────────────────────────────────
# Docker Compose — Local development & testing environment
# Usage:
#   docker compose up -d              # Start all services
#   docker compose up -d --build      # Rebuild backend image
#   docker compose logs -f backend    # Follow backend logs
#   docker compose down               # Stop and remove containers
# ──────────────────────────────────────────────────────────────────

services:
  # ─── BACKEND (Node.js + PM2 cluster) ─────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: incubation-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - REDIS_URL=redis://redis:6379
      - PM2_INSTANCES=2
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:5000/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─── REDIS ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: incubation-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --loglevel warning
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── NGINX (reverse proxy + load balancer) ──────────────────
  nginx:
    image: nginx:alpine
    container_name: incubation-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infra/nginx/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

volumes:
  redis-data:
    driver: local

networks:
  app-network:
    driver: bridge
